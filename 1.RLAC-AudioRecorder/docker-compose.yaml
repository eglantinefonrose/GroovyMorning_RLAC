services:
  rlac-server:
    image: ghcr.io/eglantinefonrose/rlac-server:latest
    container_name: rlac-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TZ=Europe/Paris
      - JAVA_OPTS=-Xmx512m -Xms256m
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
    volumes:
      - ./media:/app/media:rw
      - ./data:/app/data:rw
      - ./logs:/app/logs
    networks:
      - rlac-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  rlac-network:
    driver: bridge